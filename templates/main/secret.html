<!DOCTYPE html>
<html lang="ru">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <title>Вход в систему</title>
        <style>
            .press-start-2p-regular {
                font-family: "Press Start 2P", system-ui;
                font-weight: 400;
               font-style: normal;
           }

            body {
            background: black;
                color: white;
               font-family: "Press Start 2P", serif;
               
           }
           .main {
                height: 100px;
                text-align: center;
                position: absolute;
                top: 45%;
                left: 52%;
                transform: translate(-50%, -50%);
           }
    
           .login  {
                background-color: black;
                border-color: white;
                border: 3px solid;
                margin: 30px;
                font-family: "Press Start 2P", serif;
                padding: 20px 20px;
                color: white;
                font-size: 14px;
                caret-shape: block;
                caret-color: white;
                display: block;
                text-align: left;
                width: 300px
           }
           .password {
                background-color: black;
                border-color: white;
                border: 3px solid;
                margin: 30px;
                font-family: "Press Start 2P", serif;
                padding: 20px 20px;
                color: white;
                font-size: 14px;
                caret-shape: block;
                caret-color: white;
                display: block;
                text-align: left;
                width: 300px
           }

           .login:focus {
                outline: none
           }
           .password:focus {
                outline: none
           }
           button {
                background-color: black;
                border-color: white;
                border: 3px solid;
                margin: 20px 0px 0px;
                font-family: "Press Start 2P", serif;
                padding: 20px;
                color: white;
                font-size: 14px;
                caret-shape: block;
                caret-color: white;
            }    
            .hid {
                display: none;
                padding: 40px;
            }
    </style>
    </head>
    <body>
        <div class="main">
                Авторизуйтесь
                <input type="text" class="login" name="username" placeholder="Логин">
                <input type="password" class="password" name="username" placeholder="Пароль">
                <button id="but" type="button" onclick="doLogin()">Подтвердить</button>
                <div class="hid">Неверно!</div>
                
        </div>
        
        <script>
            function doLogin() {
                event.preventDefault();
                const u = document.querySelector('.login').value;
                const p = document.querySelector('.password').value;
                const e = document.querySelector('.hid');
                fetch('/post', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: u, password: p})
                })
                .then(responce => {
                if (!responce.ok) {
                    e.textContent = "Ошибка!";
                    e.style.display = "block";
                }
                return responce.json();
                })
                .then(JData => {
                    if (JData.is === "OK") {
                    e.textContent = "Верно!";
                    e.style.display = "block";
                    window.location.href = JData.site;
                } else {
                    e.textContent = "Неверно";
                    e.style.display = "block";
                }
                });
            };
        </script>
    </body>
</html>
